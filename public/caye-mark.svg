<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" aria-label="Caye">
  <defs>
    <radialGradient id="orbMain" cx="0.35" cy="0.35" r="0.8">
      <stop offset="0%" stop-color="#7fd1c8" />
      <stop offset="45%" stop-color="#0b6a6e" />
      <stop offset="100%" stop-color="#051217" />
    </radialGradient>
    <radialGradient id="highlight" cx="0.72" cy="0.18" r="0.22">
      <stop offset="0%" stop-color="#fff6e6" stop-opacity="0.95" />
      <stop offset="60%" stop-color="#ffdca6" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#ffdca6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="rim" cx="0.5" cy="0.5" r="0.95">
      <stop offset="85%" stop-color="rgba(0,0,0,0)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.45)" />
    </radialGradient>
  </defs>

  <!-- Background (transparent) -->
  <rect width="1024" height="1024" fill="transparent" />

  <!-- Main orb -->
  <circle cx="512" cy="512" r="460" fill="url(#orbMain)" />

  <!-- Subtle inner glow (soften top-left) -->
  <ellipse cx="410" cy="380" rx="260" ry="230" fill="rgba(125,201,203,0.08)" />

  <!-- Highlight / sheen on upper-right -->
  <circle cx="700" cy="210" r="100" fill="url(#highlight)" />

  <!-- Tiny specular dot -->
  <circle cx="760" cy="180" r="18" fill="#ffffff" opacity="0.95" />

  <!-- Dark rim to match sample's vignette -->
  <circle cx="512" cy="512" r="460" fill="none" stroke="url(#rim)" stroke-width="80" />
</svg>
